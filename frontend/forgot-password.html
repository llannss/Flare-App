<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flare - Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gabarito:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        
        <div class="logo-section">
            <img src="assets/logo.png" alt="Flare Logo" class="main-logo-img">
        </div>

        <div class="login-card">
            <h2>Forgot Your Password?</h2>
            <p class="subtitle">Please enter your registered email.</p>

            <form class="login-form" id="forgotPasswordForm">
                <div class="input-group">
                    <input type="email" id="email" placeholder="Email" required autocomplete="email">
                </div>

                <div style="margin-top: 4px;"></div>

                <button type="submit" class="btn-submit">Send Code</button>
            </form>

            <p class="signup-redirect">
                <a href="login.html" class="forgot-link">Back to Login</a>
            </p>
        </div>

    </div>
    <script src="js/forgot-password.js"></script>
</body>
</html>
